<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boardroom TTX: Cyber Crisis Simulator</title>
    <!-- Chart.js for Radar Graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --accent-blue: #3182ce;
            --accent-red: #e53e3e;
            --accent-green: #38a169;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .subtitle { font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
        }

        /* Scenario Display */
        .scenario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .badge {
            background: #ebf8ff;
            color: var(--accent-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Options */
        .option-btn {
            width: 100%;
            text-align: left;
            background: white;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .option-btn:hover {
            border-color: var(--accent-blue);
            background: #ebf8ff;
        }
        .option-btn:active {
            transform: scale(0.99);
        }

        /* Detriment Panel (Act 854) */
        .detriment-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .detriment-item {
            background: #fff5f5;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-red);
            font-size: 0.85rem;
        }
        .detriment-label { font-weight: 600; display: block; margin-bottom: 2px; }
        .detriment-score { float: right; font-weight: bold; }

        /* Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr 1fr; }
        }

            height: 30
